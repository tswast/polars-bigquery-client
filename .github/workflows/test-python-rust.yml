name: Test Python (Unit)

on:
  pull_request:
    paths:
      - Cargo.lock
      - crates/**
      - docs/source/src/python/**
      - py-polars-bigquery/**
      - .github/workflows/test-python-unit.yml
  push:
    branches:
      - main
    paths:
      - Cargo.lock
      - crates/**
      - docs/source/src/python/**
      - py-polars-bigquery/**
      - .github/workflows/test-python-unit.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUSTFLAGS: -C debuginfo=0 # Do not produce debug symbols to keep memory usage down
  RUST_BACKTRACE: 1
  PYTHONUTF8: 1

defaults:
  run:
    working-directory: py-polars-bigquery
    shell: bash

jobs:
  test-python:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.12', '3.13', '3.14', '3.14t']
        include:
          - os: windows-latest
            python-version: '3.14'

    steps:
      - uses: actions/checkout@v6

      - name: Free some disk space (remove unused packages)
        uses: jlumbroso/free-disk-space@v1.3.1
        if: ${{ matrix.os != 'windows-latest' }}

      - name: Enable long paths on Windows
        if: matrix.os == 'windows-latest'
        shell:
          powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' -Name 'LongPathsEnabled' -Value 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create virtual environment
        env:
          BIN: ${{ matrix.os == 'windows-latest' && 'Scripts' || 'bin' }}
        run: |
          python -m venv .venv
          echo "$GITHUB_WORKSPACE/py-polars-bigquery/.venv/$BIN" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/py-polars-bigquery/.venv" >> $GITHUB_ENV
          echo "VENV=$GITHUB_WORKSPACE/py-polars-bigquery/.venv" >> $GITHUB_ENV

      - name: Install maturin
        if: matrix.python-version == '3.14t'
        run: |
          pip install uv
          uv pip install maturin

      - name: Install Python dependencies
        if: matrix.python-version != '3.14t'
        run: |
          pip install uv
          # Install typing-extensions separately whilst the `--extra-index-url` in `requirements-ci.txt`
          # doesn't have an up-to-date typing-extensions, see
          # https://github.com/astral-sh/uv/issues/6028#issuecomment-2287232150
          uv pip install -U typing-extensions
          uv pip install --compile-bytecode -r requirements-dev.txt -r requirements-ci.txt --verbose --index-strategy=unsafe-best-match
      - name: Set up Rust
        run: rustup show

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: py-polars-bigquery
          save-if: ${{ github.ref_name == 'main' }}

      - name: Install Polars BigQuery
        run: |
          pip install --no-deps -e .
          maturin develop

      - name: Run tests
        run: pytest -n auto -m tests/unit
